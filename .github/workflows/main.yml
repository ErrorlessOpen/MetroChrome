name: Build Native UWP APPX

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Discover and Run MakeAppx
      run: |
        $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter makeappx.exe -Recurse | Select-Object -First 1
        & $makeappx.FullName pack /d MetroChrome/MetroChrome /p MetroChrome_ARM.appx /o
        
    - name: Upload Finished APPX Bundle
      uses: actions/upload-artifact@v4
      with:
        name: MetroChrome-Native-ARM-Package
        path: MetroChrome_ARM.appx
