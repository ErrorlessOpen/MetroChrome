name: Build APPX

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Find and Package App
      shell: pwsh
      run: |
        $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter makeappx.exe -Recurse | 
                    Where-Object { $_.FullName -match 'x64' } | 
                    Select-Object -First 1 -ExpandProperty FullName
        
        if (-not $makeappx) {
            Write-Error "Could not find makeappx.exe in Windows Kits folder!"
            exit 1
        }
        
        Write-Host "Found compiler at: $makeappx"
        & $makeappx pack /d . /p MetroChrome_Cloud.appx /o

    - name: Upload Appx Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MetroChrome-Appx-Package
        path: MetroChrome_Cloud.appx
